<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 36" width="150" height="36">
  <title>RCM · GATE Institute Logo</title>
  <!-- Geometric mark: teal bracket + orange dot -->
  <g id="mark" transform="translate(4,6)">
    <!-- Teal L-bracket left -->
    <polyline points="0,0 0,22 8,22" stroke="#0E988C" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Orange-red accent dot -->
    <circle cx="14" cy="11" r="3" fill="#ED481C"/>
    <!-- Bright teal small square -->
    <rect x="10" y="6" width="5" height="5" rx="1" fill="none" stroke="#1CCFC0" stroke-width="1.5"/>
  </g>
  <!-- RCM wordmark -->
  <text x="30" y="26" font-family="ui-monospace, monospace" font-size="20" font-weight="700" fill="#0F112A" letter-spacing="-0.5">RCM</text>
  <!-- Divider -->
  <line x1="84" y1="9" x2="84" y2="27" stroke="#2B3062" stroke-width="1" opacity="0.4"/>
  <!-- GATE tag -->
  <text x="89" y="19" font-family="ui-monospace, monospace" font-size="7.5" font-weight="600" fill="#2B3062" letter-spacing="1">GATE</text>
  <text x="89" y="29" font-family="ui-monospace, monospace" font-size="6" font-weight="400" fill="#2B3062" letter-spacing="0.5" opacity="0.75">Institute</text>
</svg>
