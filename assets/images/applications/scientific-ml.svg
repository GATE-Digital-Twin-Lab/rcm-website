<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <title>Scientific Machine Learning</title>
  <defs>
    <linearGradient id="smlbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E7F6F5"/>
      <stop offset="100%" stop-color="#F5F4F9"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#smlbg)"/>

  <!-- CONTENT (keep within y = 24 .. 292, above the label band) -->

  <!-- ============ LEFT: PHYSICS MESH PATCH ============ -->
  <g transform="translate(48,78)">
    <!-- mesh frame -->
    <rect x="0" y="0" width="120" height="96" fill="#FFFFFF" opacity="0.55" rx="3"/>
    <!-- triangulated grid -->
    <g stroke="#0F112A" stroke-width="0.8" fill="none" opacity="0.55">
      <!-- vertical lines -->
      <line x1="30" y1="0" x2="30" y2="96"/>
      <line x1="60" y1="0" x2="60" y2="96"/>
      <line x1="90" y1="0" x2="90" y2="96"/>
      <!-- horizontal lines -->
      <line x1="0" y1="32" x2="120" y2="32"/>
      <line x1="0" y1="64" x2="120" y2="64"/>
    </g>
    <!-- diagonals (triangulation) -->
    <g stroke="#2B3062" stroke-width="0.7" fill="none" opacity="0.5">
      <line x1="0" y1="0" x2="30" y2="32"/>
      <line x1="30" y1="0" x2="60" y2="32"/>
      <line x1="60" y1="0" x2="90" y2="32"/>
      <line x1="90" y1="0" x2="120" y2="32"/>
      <line x1="0" y1="32" x2="30" y2="64"/>
      <line x1="30" y1="32" x2="60" y2="64"/>
      <line x1="60" y1="32" x2="90" y2="64"/>
      <line x1="90" y1="32" x2="120" y2="64"/>
      <line x1="0" y1="64" x2="30" y2="96"/>
      <line x1="30" y1="64" x2="60" y2="96"/>
      <line x1="60" y1="64" x2="90" y2="96"/>
      <line x1="90" y1="64" x2="120" y2="96"/>
    </g>
    <!-- teal field-contour curves over mesh -->
    <g fill="none" stroke="#0E988C" stroke-width="1.6" opacity="0.85">
      <path d="M6,22 C34,10 60,40 84,24 C100,14 112,30 116,26"/>
      <path d="M6,58 C30,48 56,74 82,56 C100,44 110,62 116,58" opacity="0.7"/>
    </g>
    <!-- label -->
    <text x="0" y="-6" font-family="ui-monospace, monospace" font-size="9" fill="#2B3062" letter-spacing="1">PHYSICS</text>
  </g>

  <!-- ============ DATA POINTS (empirical side) ============ -->
  <g transform="translate(48,206)">
    <text x="0" y="-6" font-family="ui-monospace, monospace" font-size="9" fill="#2B3062" letter-spacing="1">DATA</text>
    <!-- light axis baseline -->
    <line x1="0" y1="48" x2="120" y2="48" stroke="#2B3062" stroke-width="0.7" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="48" stroke="#2B3062" stroke-width="0.7" opacity="0.3"/>
    <!-- scattered data dots -->
    <g fill="#ED481C">
      <circle cx="14" cy="34" r="3"/>
      <circle cx="30" cy="22" r="3"/>
      <circle cx="46" cy="28" r="3"/>
      <circle cx="62" cy="16" r="3"/>
      <circle cx="80" cy="24" r="3"/>
      <circle cx="98" cy="12" r="3"/>
      <circle cx="112" cy="20" r="3"/>
    </g>
  </g>

  <!-- ============ FEED ARROWS (physics + data -> network) ============ -->
  <defs>
    <marker id="smlarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#0F112A"/>
    </marker>
  </defs>
  <g stroke="#0F112A" stroke-width="1.6" fill="none" opacity="0.8" marker-end="url(#smlarr)">
    <path d="M174,128 C204,140 214,150 244,158"/>
    <path d="M174,224 C204,212 214,196 244,182"/>
  </g>

  <!-- ============ CENTER: NEURAL NETWORK ============ -->
  <g transform="translate(250,90)">
    <text x="44" y="-8" font-family="ui-monospace, monospace" font-size="9" fill="#2B3062" letter-spacing="1" opacity="0.85" text-anchor="middle">PHYSICS-INFORMED</text>
    <!-- edges: input(4) -> hidden(3) -> output(1) -->
    <g stroke="#0F112A" stroke-width="0.8" opacity="0.4">
      <!-- input x at x=0 ; y = 18,54,90,126 ; hidden at x=70 ; y=36,72,108 -->
      <line x1="0" y1="18" x2="70" y2="36"/>
      <line x1="0" y1="18" x2="70" y2="72"/>
      <line x1="0" y1="18" x2="70" y2="108"/>
      <line x1="0" y1="54" x2="70" y2="36"/>
      <line x1="0" y1="54" x2="70" y2="72"/>
      <line x1="0" y1="54" x2="70" y2="108"/>
      <line x1="0" y1="90" x2="70" y2="36"/>
      <line x1="0" y1="90" x2="70" y2="72"/>
      <line x1="0" y1="90" x2="70" y2="108"/>
      <line x1="0" y1="126" x2="70" y2="36"/>
      <line x1="0" y1="126" x2="70" y2="72"/>
      <line x1="0" y1="126" x2="70" y2="108"/>
    </g>
    <g stroke="#0E988C" stroke-width="1" opacity="0.55">
      <!-- hidden -> output at x=140 ; y=72 -->
      <line x1="70" y1="36" x2="140" y2="72"/>
      <line x1="70" y1="72" x2="140" y2="72"/>
      <line x1="70" y1="108" x2="140" y2="72"/>
    </g>

    <!-- traveling data dots along input->hidden edges -->
    <g fill="#ED481C">
      <circle r="2.4">
        <animateMotion dur="2.4s" repeatCount="indefinite" path="M0,18 L70,72"/>
      </circle>
      <circle r="2.4">
        <animateMotion dur="2.4s" begin="0.6s" repeatCount="indefinite" path="M0,54 L70,36"/>
      </circle>
      <circle r="2.4">
        <animateMotion dur="2.4s" begin="1.2s" repeatCount="indefinite" path="M0,90 L70,108"/>
      </circle>
      <circle r="2.4">
        <animateMotion dur="2.4s" begin="1.8s" repeatCount="indefinite" path="M0,126 L70,72"/>
      </circle>
    </g>
    <!-- traveling data dots along hidden->output edges -->
    <g fill="#1CCFC0">
      <circle r="2.4">
        <animateMotion dur="2.0s" begin="0.3s" repeatCount="indefinite" path="M70,36 L140,72"/>
      </circle>
      <circle r="2.4">
        <animateMotion dur="2.0s" begin="1.0s" repeatCount="indefinite" path="M70,108 L140,72"/>
      </circle>
    </g>

    <!-- nodes: input layer -->
    <g fill="#0E988C" stroke="#1CCFC0" stroke-width="1.4">
      <circle cx="0" cy="18" r="7"/>
      <circle cx="0" cy="54" r="7"/>
      <circle cx="0" cy="90" r="7"/>
      <circle cx="0" cy="126" r="7"/>
    </g>
    <!-- nodes: hidden layer -->
    <g fill="#0E988C" stroke="#1CCFC0" stroke-width="1.4">
      <circle cx="70" cy="36" r="8"/>
      <circle cx="70" cy="72" r="8"/>
      <circle cx="70" cy="108" r="8"/>
    </g>
    <!-- node: output -->
    <circle cx="140" cy="72" r="10" fill="#1CCFC0" stroke="#0E988C" stroke-width="1.6">
      <animate attributeName="r" values="10;12;10" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============ OUTPUT ARROW (network -> surrogate) ============ -->
  <g stroke="#0F112A" stroke-width="1.6" fill="none" opacity="0.8" marker-end="url(#smlarr)">
    <path d="M404,162 L452,162"/>
  </g>

  <!-- ============ RIGHT: SURROGATE PREDICTION CURVE ============ -->
  <g transform="translate(468,96)">
    <text x="64" y="-8" font-family="ui-monospace, monospace" font-size="9" fill="#2B3062" letter-spacing="1" opacity="0.85" text-anchor="middle">surrogate</text>
    <!-- panel -->
    <rect x="0" y="0" width="128" height="128" fill="#FFFFFF" opacity="0.55" rx="3"/>
    <!-- axes -->
    <line x1="10" y1="116" x2="120" y2="116" stroke="#2B3062" stroke-width="0.8" opacity="0.35"/>
    <line x1="10" y1="12" x2="10" y2="116" stroke="#2B3062" stroke-width="0.8" opacity="0.35"/>
    <!-- faint underlying data dots -->
    <g fill="#ED481C" opacity="0.45">
      <circle cx="26" cy="92" r="2.4"/>
      <circle cx="48" cy="70" r="2.4"/>
      <circle cx="70" cy="52" r="2.4"/>
      <circle cx="92" cy="40" r="2.4"/>
      <circle cx="110" cy="30" r="2.4"/>
    </g>
    <!-- smooth surrogate prediction curve -->
    <path d="M14,104 C40,96 56,64 78,50 C96,38 108,30 120,26" fill="none" stroke="#0E988C" stroke-width="2.5" stroke-linecap="round"/>
    <!-- delta-t down tag (faster) -->
    <g transform="translate(76,98)">
      <rect x="0" y="0" width="46" height="20" rx="4" fill="#FD9600" opacity="0.16"/>
      <text x="23" y="14" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#ED481C" text-anchor="middle" letter-spacing="0.5">&#916;t &#8595;</text>
    </g>
  </g>

  <!-- Label band -->
  <rect x="0" y="300" width="640" height="60" fill="#0F112A" opacity="0.06"/>
  <text x="32" y="336" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#0F112A" letter-spacing="0.5">Scientific machine learning</text>
  <text x="32" y="354" font-family="ui-monospace, monospace" font-size="10" fill="#0E988C" letter-spacing="1" opacity="0.8">GATE RCM · Application</text>
  <!-- Corner brackets -->
  <g stroke="#0E988C" stroke-width="2" fill="none" stroke-linecap="round">
    <polyline points="12,12 12,28 28,28"/>
    <polyline points="628,12 628,28 612,28"/>
  </g>
</svg>
