<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <title>Scientific machine learning</title>
  <defs>
    <linearGradient id="sml-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E7F6F5"/>
      <stop offset="100%" stop-color="#F5F4F9"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#sml-bg)"/>

  <!-- ===================== LEFT: physics + data ===================== -->
  <g transform="translate(95,120)">
    <!-- triangulated mesh patch (physics) -->
    <g stroke="#2B3062" stroke-width="1.1" fill="none" opacity="0.8">
      <path d="M-40,-22 L0,-30 L34,-12 L20,24 L-26,28 L-40,-22 Z"/>
      <path d="M-40,-22 L20,24 M0,-30 L-26,28 M0,-30 L20,24 M34,-12 L-26,28 M-40,-22 L34,-12"/>
    </g>
    <g fill="#2B3062"><circle cx="-40" cy="-22" r="2"/><circle cx="0" cy="-30" r="2"/><circle cx="34" cy="-12" r="2"/><circle cx="20" cy="24" r="2"/><circle cx="-26" cy="28" r="2"/></g>
    <!-- sparse measured data (orange) -->
    <g fill="#ED481C"><circle cx="-30" cy="50" r="3"/><circle cx="-8" cy="58" r="3"/><circle cx="14" cy="48" r="3"/><circle cx="34" cy="56" r="3"/></g>
  </g>
  <text x="95" y="248" font-family="ui-monospace, monospace" font-size="11" fill="#2B3062" text-anchor="middle" opacity="0.85">physics + sparse data</text>

  <!-- arrow L -> center -->
  <path d="M150,150 L196,150 M188,145 L196,150 L188,155" fill="none" stroke="#2B3062" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- ===================== CENTER: physics-informed neural network ===================== -->
  <g>
    <!-- edges (animated signal flow) -->
    <g stroke="#0E988C" stroke-width="1.2" fill="none" opacity="0.55" stroke-dasharray="3 4">
      <line x1="250" y1="110" x2="320" y2="92"/><line x1="250" y1="110" x2="320" y2="138"/><line x1="250" y1="110" x2="320" y2="184"/>
      <line x1="250" y1="150" x2="320" y2="92"/><line x1="250" y1="150" x2="320" y2="138"/><line x1="250" y1="150" x2="320" y2="184"/>
      <line x1="250" y1="190" x2="320" y2="92"/><line x1="250" y1="190" x2="320" y2="138"/><line x1="250" y1="190" x2="320" y2="184"/>
      <line x1="320" y1="92" x2="390" y2="110"/><line x1="320" y1="92" x2="390" y2="150"/><line x1="320" y1="92" x2="390" y2="190"/>
      <line x1="320" y1="138" x2="390" y2="110"/><line x1="320" y1="138" x2="390" y2="150"/><line x1="320" y1="138" x2="390" y2="190"/>
      <line x1="320" y1="184" x2="390" y2="110"/><line x1="320" y1="184" x2="390" y2="150"/><line x1="320" y1="184" x2="390" y2="190"/>
      <animate attributeName="stroke-dashoffset" values="14;0" dur="1.1s" repeatCount="indefinite"/>
    </g>
    <!-- nodes -->
    <g fill="#1CCFC0" stroke="#0F112A" stroke-width="1.3">
      <circle cx="250" cy="110" r="7"/><circle cx="250" cy="150" r="7"/><circle cx="250" cy="190" r="7"/>
      <circle cx="320" cy="92" r="7"/><circle cx="320" cy="138" r="7"/><circle cx="320" cy="184" r="7"/>
      <circle cx="390" cy="110" r="7"/><circle cx="390" cy="150" r="7"/><circle cx="390" cy="190" r="7"/>
    </g>
  </g>
  <text x="320" y="262" font-family="ui-monospace, monospace" font-size="11" fill="#2B3062" text-anchor="middle" opacity="0.85">physics-informed model</text>

  <!-- arrow center -> right -->
  <path d="M420,150 L466,150 M458,145 L466,150 L458,155" fill="none" stroke="#2B3062" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- ===================== RIGHT: fast surrogate output ===================== -->
  <g transform="translate(500,120)">
    <!-- mini axes -->
    <g stroke="#2B3062" stroke-width="1" opacity="0.3"><line x1="-12" y1="60" x2="100" y2="60"/><line x1="-12" y1="60" x2="-12" y2="-30"/></g>
    <!-- sparse training points -->
    <g fill="#2B3062"><circle cx="6" cy="30" r="2.6"/><circle cx="30" cy="6" r="2.6"/><circle cx="56" cy="18" r="2.6"/><circle cx="82" cy="-8" r="2.6"/></g>
    <!-- dense smooth surrogate curve -->
    <path d="M-8,42 C16,18 28,2 46,14 C66,27 74,-6 100,-14" fill="none" stroke="#1CCFC0" stroke-width="2.6" stroke-linecap="round"/>
  </g>
  <text x="548" y="248" font-family="ui-monospace, monospace" font-size="11" fill="#2B3062" text-anchor="middle" opacity="0.85">fast surrogate · Δt↓</text>

  <!-- Label band -->
  <rect x="0" y="300" width="640" height="60" fill="#0F112A" opacity="0.06"/>
  <text x="32" y="336" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#0F112A" letter-spacing="0.5">Scientific machine learning</text>
  <text x="32" y="354" font-family="ui-monospace, monospace" font-size="10" fill="#0E988C" letter-spacing="1" opacity="0.8">GATE RCM · Application</text>

  <!-- Corner brackets -->
  <g stroke="#0E988C" stroke-width="2" fill="none" stroke-linecap="round">
    <polyline points="12,12 12,28 28,28"/>
    <polyline points="628,12 628,28 612,28"/>
  </g>
</svg>
