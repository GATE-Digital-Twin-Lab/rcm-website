<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <title>Reliable language modelling</title>
  <defs>
    <linearGradient id="lm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E7F6F5"/>
      <stop offset="100%" stop-color="#F5F4F9"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#lm-bg)"/>

  <!-- ===================== LEFT: query / prompt ===================== -->
  <g>
    <path d="M48,118 h84 a8 8 0 0 1 8 8 v40 a8 8 0 0 1 -8 8 h-58 l-14 14 v-14 h-12 a8 8 0 0 1 -8 -8 v-40 a8 8 0 0 1 8 -8 Z"
          fill="none" stroke="#0F112A" stroke-width="1.8" stroke-linejoin="round"/>
    <g fill="#2B3062"><rect x="58" y="132" width="58" height="6" rx="3"/><rect x="58" y="146" width="72" height="6" rx="3"/><rect x="58" y="160" width="40" height="6" rx="3"/></g>
  </g>
  <text x="92" y="232" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#2B3062" text-anchor="middle" letter-spacing="1">QUERY</text>

  <!-- arrow query -> model -->
  <path d="M152,150 L192,150 M184,145 L192,150 L184,155" fill="none" stroke="#2B3062" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- ===================== CENTER: language model + token stream ===================== -->
  <g>
    <rect x="202" y="118" width="74" height="64" rx="6" fill="#0F112A"/>
    <g stroke="#1CCFC0" stroke-width="1.4" opacity="0.7"><line x1="214" y1="134" x2="264" y2="134"/><line x1="214" y1="150" x2="264" y2="150"/><line x1="214" y1="166" x2="264" y2="166"/></g>
    <text x="239" y="200" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#2B3062" text-anchor="middle" letter-spacing="1">LLM</text>
    <!-- token stream emerging right -->
    <g>
      <rect x="288" y="144" width="14" height="12" rx="2" fill="#2B3062"><animate attributeName="opacity" values="0;1;1;1" dur="2.4s" begin="0s" repeatCount="indefinite"/></rect>
      <rect x="308" y="144" width="14" height="12" rx="2" fill="#2B3062"><animate attributeName="opacity" values="0;0;1;1" dur="2.4s" begin="0s" repeatCount="indefinite"/></rect>
      <rect x="328" y="144" width="14" height="12" rx="2" fill="#ED481C"><animate attributeName="opacity" values="0;0;1;1" dur="2.4s" begin="0.3s" repeatCount="indefinite"/></rect>
      <rect x="348" y="144" width="14" height="12" rx="2" fill="#2B3062"><animate attributeName="opacity" values="0;0;0;1" dur="2.4s" begin="0.3s" repeatCount="indefinite"/></rect>
    </g>
  </g>
  <text x="325" y="200" font-family="ui-monospace, monospace" font-size="10" fill="#2B3062" text-anchor="middle" opacity="0.7">tokens</text>

  <!-- flow into guarantee -->
  <path d="M372,150 L404,150 M396,145 L404,150 L396,155" fill="none" stroke="#2B3062" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- ===================== RIGHT: conformal prediction set (guarantee) ===================== -->
  <g>
    <!-- coverage rails (the interval bracketing the valid answer set) -->
    <g stroke="#0E988C" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="428" y1="128" x2="592" y2="128"/>
      <line x1="428" y1="172" x2="592" y2="172"/>
      <!-- end brackets -->
      <polyline points="436,122 428,122 428,178 436,178"/>
      <polyline points="584,122 592,122 592,178 584,178"/>
    </g>
    <rect x="428" y="128" width="164" height="44" fill="#0E988C" opacity="0.08"/>
    <!-- candidate answer tokens inside the set -->
    <g fill="#2B3062"><rect x="446" y="144" width="16" height="12" rx="2"/><rect x="468" y="144" width="22" height="12" rx="2"/><rect x="496" y="144" width="14" height="12" rx="2"/><rect x="516" y="144" width="20" height="12" rx="2"/></g>
    <!-- validity check -->
    <g transform="translate(566,150)">
      <circle r="13" fill="#0E988C" opacity="0.14"/>
      <circle r="13" fill="none" stroke="#0E988C" stroke-width="2"/>
      <polyline points="-6,0 -1,5 7,-6" fill="none" stroke="#0E988C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <text x="510" y="206" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#0E988C" text-anchor="middle" letter-spacing="1">CONFORMAL · 95% COVERAGE</text>
  <text x="510" y="222" font-family="ui-monospace, monospace" font-size="9.5" fill="#2B3062" text-anchor="middle" opacity="0.7">guaranteed-valid answer set</text>

  <!-- Label band -->
  <rect x="0" y="300" width="640" height="60" fill="#0F112A" opacity="0.06"/>
  <text x="32" y="336" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#0F112A" letter-spacing="0.5">Reliable language modelling</text>
  <text x="32" y="354" font-family="ui-monospace, monospace" font-size="10" fill="#0E988C" letter-spacing="1" opacity="0.8">GATE RCM · Application</text>

  <!-- Corner brackets -->
  <g stroke="#0E988C" stroke-width="2" fill="none" stroke-linecap="round">
    <polyline points="12,12 12,28 28,28"/>
    <polyline points="628,12 628,28 612,28"/>
  </g>
</svg>
