<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <title>Reliable Language Modelling</title>
  <defs>
    <linearGradient id="rlmbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E7F6F5"/>
      <stop offset="100%" stop-color="#F5F4F9"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#rlmbg)"/>

  <!-- CONTENT (within y = 24 .. 292) -->

  <!-- Flow guide lines (faint) -->
  <g stroke="#0F112A" stroke-width="1" opacity="0.12" stroke-dasharray="3 4">
    <line x1="110" y1="157" x2="228" y2="157"/>
    <line x1="372" y1="156" x2="420" y2="156"/>
  </g>

  <!-- QUESTION token row (left) -->
  <text x="44" y="104" font-family="ui-monospace, monospace" font-size="9" fill="#0F112A" opacity="0.7" letter-spacing="1">QUESTION</text>
  <g font-family="ui-monospace, monospace" font-size="13" fill="#0F112A" text-anchor="middle">
    <rect x="44" y="115" width="66" height="24" rx="7" fill="#FFFFFF" fill-opacity="0.6" stroke="#0F112A" stroke-width="1.6"/>
    <text x="77" y="131">[ ? ]</text>
    <rect x="44" y="145" width="66" height="24" rx="7" fill="#FFFFFF" fill-opacity="0.6" stroke="#0F112A" stroke-width="1.6"/>
    <text x="77" y="161">[ ? ]</text>
    <rect x="44" y="175" width="66" height="24" rx="7" fill="#FFFFFF" fill-opacity="0.6" stroke="#0F112A" stroke-width="1.6"/>
    <text x="77" y="191">[ ? ]</text>
  </g>

  <!-- Flow dots: tokens -> model -->
  <g fill="#0E988C">
    <circle cy="157" r="4">
      <animate attributeName="cx" values="116;226" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cy="157" r="4">
      <animate attributeName="cx" values="116;226" dur="3s" begin="-1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="3s" begin="-1s" repeatCount="indefinite"/>
    </circle>
    <circle cy="157" r="4">
      <animate attributeName="cx" values="116;226" dur="3s" begin="-2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="3s" begin="-2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- LANGUAGE-MODEL block (center) -->
  <rect x="228" y="113" width="144" height="84" rx="14" fill="#1CCFC0" fill-opacity="0.10" stroke="#0F112A" stroke-width="2"/>
  <text x="300" y="171" font-family="ui-monospace, monospace" font-size="46" font-weight="700" fill="#0F112A" text-anchor="middle">{ }</text>
  <text x="300" y="189" font-family="ui-monospace, monospace" font-size="9" fill="#0F112A" opacity="0.7" text-anchor="middle" letter-spacing="0.5">language model</text>

  <!-- Flow dots: model -> coverage set -->
  <g fill="#0E988C">
    <circle cy="156" r="3.5">
      <animate attributeName="cx" values="376;416" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.8;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cy="156" r="3.5">
      <animate attributeName="cx" values="376;416" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.8;1" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- CONFORMAL PREDICTION INTERVAL (coverage set) -->
  <text x="420" y="116" font-family="ui-monospace, monospace" font-size="9" font-weight="700" fill="#0E988C" letter-spacing="1.5">95% COVERAGE</text>
  <!-- coverage band (breathing) -->
  <rect x="420" y="124" width="176" height="62" fill="#1CCFC0" fill-opacity="0.14">
    <animate attributeName="fill-opacity" values="0.10;0.20;0.10" dur="4.5s" repeatCount="indefinite"/>
  </rect>
  <!-- interval rails + end caps -->
  <g stroke="#1CCFC0" stroke-width="2.5" stroke-linecap="round">
    <line x1="420" y1="124" x2="596" y2="124"/>
    <line x1="420" y1="186" x2="596" y2="186"/>
  </g>
  <g stroke="#1CCFC0" stroke-width="2.5" stroke-linecap="round" opacity="0.45">
    <line x1="421" y1="124" x2="421" y2="186"/>
    <line x1="595" y1="124" x2="595" y2="186"/>
  </g>

  <!-- excluded candidates (outside the interval, above the rail) -->
  <g fill="#ED481C" opacity="0.35">
    <circle cx="445" cy="100" r="3"/>
    <circle cx="488" cy="98" r="3"/>
    <circle cx="528" cy="103" r="3"/>
    <circle cx="560" cy="101" r="3"/>
    <circle cx="585" cy="107" r="3"/>
  </g>

  <!-- covered candidates (inside the interval) -->
  <g fill="#0F112A" opacity="0.9">
    <circle cx="450" cy="142" r="3.5"/>
    <circle cx="476" cy="170" r="3.5"/>
    <circle cx="540" cy="140" r="3.5"/>
    <circle cx="556" cy="168" r="3.5"/>
  </g>

  <!-- selected answer -->
  <circle cx="505" cy="155" r="11" fill="none" stroke="#1CCFC0" stroke-width="1.5" opacity="0.85"/>
  <circle cx="505" cy="155" r="6" fill="#0F112A"/>
  <text x="505" y="178" font-family="ui-monospace, monospace" font-size="8" fill="#0F112A" text-anchor="middle" letter-spacing="0.5">answer</text>

  <!-- auditable check-circle seal (pulsing) -->
  <g transform="translate(575,152)">
    <circle r="15" fill="none" stroke="#0E988C" stroke-width="1.5" opacity="0.5">
      <animate attributeName="opacity" values="0.15;0.6;0.15" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="14;17;14" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <g>
      <circle r="13" fill="#0E988C" fill-opacity="0.14" stroke="#0E988C" stroke-width="2.5"/>
      <polyline points="-6,1 -2,5 7,-6" fill="none" stroke="#0E988C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="3.2s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>

  <!-- micro-labels -->
  <text x="420" y="206" font-family="ui-monospace, monospace" font-size="9" fill="#2B3062" opacity="0.8" letter-spacing="0.5">conformal prediction</text>
  <text x="596" y="219" font-family="ui-monospace, monospace" font-size="9" fill="#2B3062" opacity="0.8" text-anchor="end" letter-spacing="0.5">auditable</text>

  <!-- Label band -->
  <rect x="0" y="300" width="640" height="60" fill="#0F112A" opacity="0.06"/>
  <text x="32" y="336" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#0F112A" letter-spacing="0.5">Reliable language modelling</text>
  <text x="32" y="354" font-family="ui-monospace, monospace" font-size="10" fill="#0E988C" letter-spacing="1" opacity="0.8">GATE RCM · Application</text>
  <!-- Corner brackets -->
  <g stroke="#0E988C" stroke-width="2" fill="none" stroke-linecap="round">
    <polyline points="12,12 12,28 28,28"/>
    <polyline points="628,12 628,28 612,28"/>
  </g>
</svg>
