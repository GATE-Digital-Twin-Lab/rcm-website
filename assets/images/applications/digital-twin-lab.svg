<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <title>Digital Twin Laboratory — real aircraft paired with its digital twin</title>
  <defs>
    <linearGradient id="dtlbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E7F6F5"/>
      <stop offset="100%" stop-color="#F5F4F9"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#dtlbg)"/>

  <!-- ===== PHYSICAL ASSET: real aircraft (solid navy), gently "flying" ===== -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 4 -5; 0 0; -4 5; 0 0" dur="4.2s" repeatCount="indefinite"/>
    <g transform="translate(170,150) scale(0.6)">
      <g fill="#0F112A">
        <ellipse cx="0" cy="0" rx="95" ry="14"/>
        <path d="M-10,-12 L-50,-65 L-80,-60 L-60,-10 Z"/>
        <path d="M-10,12 L-50,65 L-80,60 L-60,10 Z"/>
        <path d="M-75,-12 L-95,-35 L-100,-28 L-85,-10 Z"/>
        <path d="M-75,12 L-95,35 L-100,28 L-85,10 Z"/>
      </g>
      <ellipse cx="-35" cy="-42" rx="14" ry="7" transform="rotate(-15 -35 -42)" fill="#2B3062"/>
      <ellipse cx="-35" cy="42" rx="14" ry="7" transform="rotate(15 -35 42)" fill="#2B3062"/>
    </g>
  </g>

  <!-- ===== DIGITAL TWIN: dashed teal wireframe of the same aircraft (static) ===== -->
  <g transform="translate(470,150) scale(0.6)" fill="none" stroke="#0E988C" stroke-width="4" stroke-dasharray="11 7" stroke-linejoin="round" stroke-linecap="round">
    <ellipse cx="0" cy="0" rx="95" ry="14"/>
    <path d="M-10,-12 L-50,-65 L-80,-60 L-60,-10 Z"/>
    <path d="M-10,12 L-50,65 L-80,60 L-60,10 Z"/>
    <path d="M-75,-12 L-95,-35 L-100,-28 L-85,-10 Z"/>
    <path d="M-75,12 L-95,35 L-100,28 L-85,10 Z"/>
    <ellipse cx="-35" cy="-42" rx="14" ry="7" transform="rotate(-15 -35 -42)"/>
    <ellipse cx="-35" cy="42" rx="14" ry="7" transform="rotate(15 -35 42)"/>
  </g>
  <!-- twin measurement nodes -->
  <g fill="#1CCFC0">
    <circle cx="527" cy="150" r="3.5"/>
    <circle cx="422" cy="111" r="3.5"/>
    <circle cx="422" cy="189" r="3.5"/>
    <circle cx="410" cy="129" r="3"/>
    <circle cx="410" cy="171" r="3"/>
  </g>

  <!-- ===== Bidirectional sync (twin <-> real, both inform each other) ===== -->
  <g stroke="#ED481C" stroke-width="2.4" fill="none" stroke-dasharray="2 8" stroke-linecap="round">
    <line x1="250" y1="132" x2="372" y2="132"><animate attributeName="stroke-dashoffset" values="0;-10" dur="0.9s" repeatCount="indefinite"/></line>
    <line x1="372" y1="168" x2="250" y2="168"><animate attributeName="stroke-dashoffset" values="0;-10" dur="0.9s" repeatCount="indefinite"/></line>
  </g>
  <g fill="#ED481C">
    <path d="M366,127 L377,132 L366,137 Z"/>
    <path d="M256,163 L245,168 L256,173 Z"/>
  </g>

  <!-- Titles -->
  <text x="190" y="252" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#0F112A" text-anchor="middle" letter-spacing="2">PHYSICAL ASSET</text>
  <text x="470" y="252" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#0E988C" text-anchor="middle" letter-spacing="2">DIGITAL TWIN</text>

  <!-- Label band -->
  <rect x="0" y="300" width="640" height="60" fill="#0F112A" opacity="0.06"/>
  <text x="32" y="336" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#0F112A" letter-spacing="0.5">Digital Twin Laboratory</text>
  <text x="32" y="354" font-family="ui-monospace, monospace" font-size="10" fill="#0E988C" letter-spacing="1" opacity="0.8">GATE RCM · Application</text>

  <!-- Corner brackets -->
  <g stroke="#0E988C" stroke-width="2" fill="none" stroke-linecap="round">
    <polyline points="12,12 12,28 28,28"/>
    <polyline points="628,12 628,28 612,28"/>
  </g>
</svg>
