<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="dtl-title">
  <title id="dtl-title">Digital Twin Laboratory</title>
  <rect width="640" height="360" fill="#EEF4FF"/>
  <!-- subtle dot grid -->
  <g fill="#2B3062" opacity="0.10">
    <circle cx="60" cy="60" r="3"/><circle cx="110" cy="60" r="3"/><circle cx="160" cy="60" r="3"/>
    <circle cx="480" cy="60" r="3"/><circle cx="530" cy="60" r="3"/><circle cx="580" cy="60" r="3"/>
    <circle cx="60" cy="300" r="3"/><circle cx="110" cy="300" r="3"/>
    <circle cx="530" cy="300" r="3"/><circle cx="580" cy="300" r="3"/>
  </g>
  <!-- physical asset: solid navy building -->
  <g>
    <rect x="120" y="108" width="116" height="150" rx="8" fill="#0F112A"/>
    <rect x="140" y="128" width="22" height="22" rx="3" fill="#1CCFC0"/>
    <rect x="172" y="128" width="22" height="22" rx="3" fill="#1CCFC0" opacity="0.6"/>
    <rect x="140" y="160" width="22" height="22" rx="3" fill="#1CCFC0" opacity="0.6"/>
    <rect x="172" y="160" width="22" height="22" rx="3" fill="#1CCFC0"/>
    <rect x="156" y="200" width="44" height="58" rx="3" fill="#2B3062"/>
  </g>
  <!-- digital twin: teal dashed wireframe of the same building -->
  <g fill="none" stroke="#0E988C" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="7 5">
    <rect x="404" y="108" width="116" height="150" rx="8"/>
    <rect x="424" y="128" width="22" height="22" rx="3"/>
    <rect x="456" y="128" width="22" height="22" rx="3"/>
    <rect x="424" y="160" width="22" height="22" rx="3"/>
    <rect x="456" y="160" width="22" height="22" rx="3"/>
    <rect x="440" y="200" width="44" height="58" rx="3"/>
  </g>
  <!-- sync connector -->
  <line x1="244" y1="183" x2="396" y2="183" stroke="#ED481C" stroke-width="3" stroke-dasharray="2 9" stroke-linecap="round"/>
  <circle cx="320" cy="183" r="11" fill="#FD9600"/>
  <path d="M316 178l8 5-8 5z" fill="#0F112A"/>
  <!-- label -->
  <text x="120" y="312" font-family="ui-monospace, monospace" font-size="14" letter-spacing="1.5" fill="#0E988C">// CO-INNOVATION</text>
  <text x="120" y="338" font-family="ui-monospace, monospace" font-size="24" font-weight="700" fill="#0F112A">Digital Twin Laboratory</text>
</svg>
