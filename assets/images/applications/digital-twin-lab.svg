<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <title>Digital Twin Laboratory</title>
  <defs>
    <linearGradient id="dtlbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E7F6F5"/>
      <stop offset="100%" stop-color="#F5F4F9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="640" height="360" fill="url(#dtlbg)"/>

  <!-- ===================== PHYSICAL ASSET (solid, navy) ===================== -->
  <g>
    <!-- Top face -->
    <polygon points="120,80 148,60 258,60 230,80" fill="#2B3062"/>
    <!-- Right face -->
    <polygon points="230,80 258,60 258,205 230,225" fill="#191D3F"/>
    <!-- Front face -->
    <rect x="120" y="80" width="110" height="145" fill="#0F112A"/>
    <!-- Window grid -->
    <g stroke="#1CCFC0" stroke-width="0.9" opacity="0.45">
      <line x1="157" y1="80" x2="157" y2="225"/>
      <line x1="193" y1="80" x2="193" y2="225"/>
      <line x1="120" y1="116" x2="230" y2="116"/>
      <line x1="120" y1="152" x2="230" y2="152"/>
      <line x1="120" y1="188" x2="230" y2="188"/>
    </g>
  </g>

  <!-- ===================== DIGITAL TWIN (dashed teal wireframe) ===================== -->
  <g fill="none" stroke="#0E988C">
    <rect x="410" y="80" width="110" height="145" fill="#0E988C" opacity="0.06" stroke="none"/>
    <g stroke-width="2" stroke-dasharray="7 5" stroke-linejoin="round">
      <rect x="410" y="80" width="110" height="145"/>
      <polygon points="410,80 438,60 548,60 520,80"/>
      <polyline points="520,80 548,60 548,205 520,225"/>
    </g>
    <g stroke-width="1" stroke-dasharray="4 4" opacity="0.6">
      <line x1="447" y1="80" x2="447" y2="225"/>
      <line x1="483" y1="80" x2="483" y2="225"/>
      <line x1="410" y1="116" x2="520" y2="116"/>
      <line x1="410" y1="152" x2="520" y2="152"/>
      <line x1="410" y1="188" x2="520" y2="188"/>
    </g>
  </g>
  <!-- Twin corner measurement nodes (a couple gently pulsing) -->
  <g fill="#1CCFC0">
    <circle cx="410" cy="80" r="3.5"><animate attributeName="r" values="3.5;5;3.5" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="80" r="3.5"/>
    <circle cx="520" cy="225" r="3.5"><animate attributeName="r" values="3.5;5;3.5" dur="2.6s" begin="-1.3s" repeatCount="indefinite"/></circle>
    <circle cx="410" cy="225" r="3.5"/>
    <circle cx="438" cy="60" r="3"/>
    <circle cx="548" cy="60" r="3"/>
    <circle cx="548" cy="205" r="3"/>
  </g>

  <!-- ===================== BIDIRECTIONAL SYNC (twin <-> asset) ===================== -->
  <g stroke="#ED481C" stroke-width="2.4" fill="none" stroke-dasharray="2 8" stroke-linecap="round">
    <line x1="268" y1="132" x2="400" y2="132"><animate attributeName="stroke-dashoffset" values="0;-10" dur="0.9s" repeatCount="indefinite"/></line>
    <line x1="400" y1="160" x2="268" y2="160"><animate attributeName="stroke-dashoffset" values="0;-10" dur="0.9s" repeatCount="indefinite"/></line>
  </g>
  <!-- Arrowheads: right into the twin (top), left into the asset (bottom) -->
  <g fill="#ED481C">
    <path d="M394,127 L405,132 L394,137 Z"/>
    <path d="M274,155 L263,160 L274,165 Z"/>
  </g>
  <!-- Flowing data packets riding the link -->
  <g fill="#ED481C">
    <circle cy="132" r="3"><animate attributeName="cx" values="276;396" dur="2.4s" begin="0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="2.4s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cy="132" r="3"><animate attributeName="cx" values="276;396" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/></circle>
    <circle cy="160" r="3"><animate attributeName="cx" values="396;276" dur="2.4s" begin="-0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="2.4s" begin="-0.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Titles -->
  <text x="185" y="255" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#0F112A" text-anchor="middle" letter-spacing="2">PHYSICAL ASSET</text>
  <text x="475" y="255" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#0E988C" text-anchor="middle" letter-spacing="2">DIGITAL TWIN</text>

  <!-- Label -->
  <rect x="0" y="300" width="640" height="60" fill="#0F112A" opacity="0.06"/>
  <text x="32" y="336" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#0F112A" letter-spacing="0.5">Digital Twin Laboratory</text>
  <text x="32" y="354" font-family="ui-monospace, monospace" font-size="10" fill="#0E988C" letter-spacing="1" opacity="0.8">GATE RCM · Application</text>

  <!-- Corner bracket decorations -->
  <g stroke="#0E988C" stroke-width="2" fill="none" stroke-linecap="round">
    <polyline points="12,12 12,28 28,28"/>
    <polyline points="628,12 628,28 612,28"/>
  </g>
</svg>
