<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <title>Industrial Modelling — Gear/Structure/Seismic Motif</title>
  <defs>
    <linearGradient id="ind-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F4F9"/>
      <stop offset="100%" stop-color="#E7F6F5"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#ind-bg)"/>

  <!-- Gear — large (teal outline) centered left -->
  <g transform="translate(160,155)" stroke="#0E988C" stroke-width="2" fill="none">
    <!-- Gear teeth (12 teeth) -->
    <circle cx="0" cy="0" r="58"/>
    <circle cx="0" cy="0" r="44"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="18" stroke="#1CCFC0" stroke-width="1.5"/>
    <!-- Cross spokes -->
    <line x1="0" y1="-44" x2="0" y2="44" stroke="#0E988C" stroke-width="1.5" opacity="0.5"/>
    <line x1="-44" y1="0" x2="44" y2="0" stroke="#0E988C" stroke-width="1.5" opacity="0.5"/>
    <line x1="-31" y1="-31" x2="31" y2="31" stroke="#0E988C" stroke-width="1" opacity="0.3"/>
    <line x1="31" y1="-31" x2="-31" y2="31" stroke="#0E988C" stroke-width="1" opacity="0.3"/>
    <!-- Gear teeth rects -->
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5"/>
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5" transform="rotate(30)"/>
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5" transform="rotate(60)"/>
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5" transform="rotate(90)"/>
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5" transform="rotate(120)"/>
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5" transform="rotate(150)"/>
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5" transform="rotate(180)"/>
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5" transform="rotate(210)"/>
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5" transform="rotate(240)"/>
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5" transform="rotate(270)"/>
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5" transform="rotate(300)"/>
    <rect x="-8" y="-67" width="16" height="13" rx="2" fill="#E7F6F5" stroke="#0E988C" stroke-width="1.5" transform="rotate(330)"/>
  </g>

  <!-- Small gear (orange-red) -->
  <g transform="translate(275,105)" stroke="#ED481C" stroke-width="1.5" fill="none">
    <circle cx="0" cy="0" r="32"/>
    <circle cx="0" cy="0" r="24"/>
    <circle cx="0" cy="0" r="10" stroke="#FD9600" stroke-width="1.5"/>
    <line x1="0" y1="-24" x2="0" y2="24" stroke="#ED481C" stroke-width="1" opacity="0.5"/>
    <line x1="-24" y1="0" x2="24" y2="0" stroke="#ED481C" stroke-width="1" opacity="0.5"/>
    <!-- 8 teeth -->
    <rect x="-5" y="-37" width="10" height="9" rx="1.5" fill="#F5F4F9" stroke="#ED481C" stroke-width="1.2"/>
    <rect x="-5" y="-37" width="10" height="9" rx="1.5" fill="#F5F4F9" stroke="#ED481C" stroke-width="1.2" transform="rotate(45)"/>
    <rect x="-5" y="-37" width="10" height="9" rx="1.5" fill="#F5F4F9" stroke="#ED481C" stroke-width="1.2" transform="rotate(90)"/>
    <rect x="-5" y="-37" width="10" height="9" rx="1.5" fill="#F5F4F9" stroke="#ED481C" stroke-width="1.2" transform="rotate(135)"/>
    <rect x="-5" y="-37" width="10" height="9" rx="1.5" fill="#F5F4F9" stroke="#ED481C" stroke-width="1.2" transform="rotate(180)"/>
    <rect x="-5" y="-37" width="10" height="9" rx="1.5" fill="#F5F4F9" stroke="#ED481C" stroke-width="1.2" transform="rotate(225)"/>
    <rect x="-5" y="-37" width="10" height="9" rx="1.5" fill="#F5F4F9" stroke="#ED481C" stroke-width="1.2" transform="rotate(270)"/>
    <rect x="-5" y="-37" width="10" height="9" rx="1.5" fill="#F5F4F9" stroke="#ED481C" stroke-width="1.2" transform="rotate(315)"/>
  </g>

  <!-- Seismic / structural vibration signal -->
  <g stroke="#2B3062" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M350,200 L370,200 L380,170 L390,230 L400,160 L410,240 L420,190 L430,210 L450,200 L490,200 L500,175 L510,225 L520,195 L530,205 L550,200 L600,200"/>
  </g>
  <line x1="350" y1="200" x2="600" y2="200" stroke="#2B3062" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,3"/>

  <!-- Structure truss (navy) right -->
  <g stroke="#0F112A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.65">
    <rect x="370" y="235" width="200" height="35" rx="2"/>
    <line x1="395" y1="235" x2="380" y2="270"/>
    <line x1="420" y1="235" x2="395" y2="270"/>
    <line x1="445" y1="235" x2="420" y2="270"/>
    <line x1="470" y1="235" x2="445" y2="270"/>
    <line x1="495" y1="235" x2="470" y2="270"/>
    <line x1="520" y1="235" x2="495" y2="270"/>
    <line x1="545" y1="235" x2="520" y2="270"/>
    <line x1="570" y1="235" x2="545" y2="270"/>
  </g>

  <!-- Label -->
  <rect x="0" y="300" width="640" height="60" fill="#0F112A" opacity="0.06"/>
  <text x="32" y="336" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#0F112A" letter-spacing="0.5">Industrial modelling</text>
  <text x="32" y="354" font-family="ui-monospace, monospace" font-size="10" fill="#0E988C" letter-spacing="1" opacity="0.8">GATE RCM · Application</text>

  <!-- Corner bracket decorations -->
  <g stroke="#ED481C" stroke-width="2" fill="none" stroke-linecap="round">
    <polyline points="12,12 12,28 28,28"/>
    <polyline points="628,12 628,28 612,28"/>
  </g>
</svg>
