<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Reliable Language Models — Speech Bubble with Code Brackets and Checkmark</title>
  <!-- Speech bubble outline -->
  <path d="M8,10 Q8,6 12,6 L52,6 Q56,6 56,10 L56,38 Q56,42 52,42 L32,42 L24,56 L24,42 L12,42 Q8,42 8,38 Z"
        stroke="#0E988C" stroke-width="2" fill="#E7F6F5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Code brackets { } -->
  <text x="12" y="30" font-family="ui-monospace, monospace" font-size="18" font-weight="700" fill="#0E988C" opacity="0.6">{</text>
  <text x="44" y="30" font-family="ui-monospace, monospace" font-size="18" font-weight="700" fill="#0E988C" opacity="0.6">}</text>
  <!-- Checkmark inside -->
  <g stroke="#1CCFC0" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="25,24 30,30 38,18"/>
  </g>
</svg>
