<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Multiphysics — Fluid/Wave and Structure Motif</title>
  <!-- Fluid wave lines (teal) -->
  <g stroke="#0E988C" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M6,22 Q14,14 22,22 Q30,30 38,22 Q46,14 54,22 Q58,26 62,22"/>
    <path d="M6,32 Q14,24 22,32 Q30,40 38,32 Q46,24 54,32 Q58,36 62,32"/>
  </g>
  <!-- Structure mesh (teal, lighter) -->
  <g stroke="#1CCFC0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="8" y="42" width="18" height="14" rx="1"/>
    <line x1="8" y1="49" x2="26" y2="49"/>
    <line x1="17" y1="42" x2="17" y2="56"/>
  </g>
  <!-- Arrow indicating coupling -->
  <line x1="29" y1="48" x2="37" y2="48" stroke="#0E988C" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="35,45 38,48 35,51" stroke="#0E988C" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Deformed structure -->
  <g stroke="#1CCFC0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M39,56 L39,43 Q48,40 55,43 L55,56 Z"/>
    <line x1="39" y1="49" x2="55" y2="49"/>
    <line x1="47" y1="43" x2="47" y2="56"/>
  </g>
</svg>
