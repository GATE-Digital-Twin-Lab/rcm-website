<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Scientific Machine Learning — Neural Network Graph</title>
  <!-- Input layer nodes -->
  <g fill="none" stroke="#0E988C" stroke-width="1.8">
    <circle cx="10" cy="16" r="5"/>
    <circle cx="10" cy="32" r="5"/>
    <circle cx="10" cy="48" r="5"/>
  </g>
  <!-- Hidden layer nodes -->
  <g fill="none" stroke="#1CCFC0" stroke-width="1.8">
    <circle cx="32" cy="10" r="5"/>
    <circle cx="32" cy="26" r="5"/>
    <circle cx="32" cy="42" r="5"/>
    <circle cx="32" cy="58" r="5"/>
  </g>
  <!-- Output layer node -->
  <g fill="none" stroke="#ED481C" stroke-width="2">
    <circle cx="54" cy="32" r="6"/>
  </g>
  <!-- Input → Hidden edges -->
  <g stroke="#0E988C" stroke-width="0.9" opacity="0.55">
    <line x1="15" y1="16" x2="27" y2="10"/>
    <line x1="15" y1="16" x2="27" y2="26"/>
    <line x1="15" y1="16" x2="27" y2="42"/>
    <line x1="15" y1="16" x2="27" y2="58"/>
    <line x1="15" y1="32" x2="27" y2="10"/>
    <line x1="15" y1="32" x2="27" y2="26"/>
    <line x1="15" y1="32" x2="27" y2="42"/>
    <line x1="15" y1="32" x2="27" y2="58"/>
    <line x1="15" y1="48" x2="27" y2="10"/>
    <line x1="15" y1="48" x2="27" y2="26"/>
    <line x1="15" y1="48" x2="27" y2="42"/>
    <line x1="15" y1="48" x2="27" y2="58"/>
  </g>
  <!-- Hidden → Output edges -->
  <g stroke="#1CCFC0" stroke-width="0.9" opacity="0.55">
    <line x1="37" y1="10" x2="48" y2="32"/>
    <line x1="37" y1="26" x2="48" y2="32"/>
    <line x1="37" y1="42" x2="48" y2="32"/>
    <line x1="37" y1="58" x2="48" y2="32"/>
  </g>
  <!-- Output node fill accent -->
  <circle cx="54" cy="32" r="3" fill="#ED481C" opacity="0.7"/>
</svg>
