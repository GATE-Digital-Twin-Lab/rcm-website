<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Uncertainty Quantification — Bell Curve with Error Bars</title>
  <!-- X-axis -->
  <line x1="6" y1="52" x2="58" y2="52" stroke="#0E988C" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Bell curve approximation -->
  <path d="M8,52 C12,52 16,50 18,44 C22,34 24,18 32,14 C40,18 42,34 46,44 C48,50 52,52 56,52"
        stroke="#0E988C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Filled area under curve (soft teal) -->
  <path d="M8,52 C12,52 16,50 18,44 C22,34 24,18 32,14 C40,18 42,34 46,44 C48,50 52,52 56,52 Z"
        fill="#0E988C" opacity="0.12"/>
  <!-- Mean line -->
  <line x1="32" y1="14" x2="32" y2="52" stroke="#1CCFC0" stroke-width="1.5" stroke-dasharray="3,2" stroke-linecap="round"/>
  <!-- Error bars -->
  <g stroke="#ED481C" stroke-width="1.8" stroke-linecap="round">
    <!-- ±1σ -->
    <line x1="22" y1="40" x2="22" y2="52"/>
    <line x1="18" y1="46" x2="26" y2="46"/>
    <line x1="42" y1="40" x2="42" y2="52"/>
    <line x1="38" y1="46" x2="46" y2="46"/>
  </g>
  <!-- Tick marks on x-axis -->
  <g stroke="#0E988C" stroke-width="1.2" stroke-linecap="round">
    <line x1="12" y1="52" x2="12" y2="55"/>
    <line x1="22" y1="52" x2="22" y2="55"/>
    <line x1="32" y1="52" x2="32" y2="55"/>
    <line x1="42" y1="52" x2="42" y2="55"/>
    <line x1="52" y1="52" x2="52" y2="55"/>
  </g>
  <!-- μ label -->
  <text x="28.5" y="62" font-family="ui-monospace, monospace" font-size="8" fill="#0E988C" font-style="italic">μ</text>
</svg>
