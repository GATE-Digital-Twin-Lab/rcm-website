<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <title>RCM Graphical Abstract — The Reliability Pipeline</title>
  <defs>
    <linearGradient id="pl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F4F9"/>
      <stop offset="100%" stop-color="#E7F6F5"/>
    </linearGradient>
    <pattern id="pl-dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#2B3062" opacity="0.16"/>
    </pattern>
    <clipPath id="g3clip"><rect x="525" y="150" width="135" height="235"/></clipPath>
  </defs>

  <rect width="1000" height="600" fill="url(#pl-bg)"/>
  <rect width="1000" height="600" fill="url(#pl-dots)"/>

  <!-- Eyebrow + wordmark -->
  <text x="40" y="40" font-family="ui-monospace, monospace" font-size="12" font-weight="700" fill="#2B3062" letter-spacing="2">// RELIABLE COMPUTATIONAL MODELLING</text>
  <text x="960" y="40" font-family="ui-monospace, monospace" font-size="12" font-weight="700" fill="#0E988C" letter-spacing="2" text-anchor="end">GATE · RCM</text>

  <!-- Figure body — shifted down to vertically center the composition -->
  <g transform="translate(0,40)">
  <!-- Mission poles -->
  <text x="44" y="86" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#ED481C" letter-spacing="2">[ ASSESS</text>
  <text x="956" y="86" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#0E988C" letter-spacing="2" text-anchor="end">IMPROVE ]</text>

  <!-- Domain inlets (the application domains feeding raw geometry) -->
  <text x="90" y="138" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#0F112A" letter-spacing="1.5">INPUTS · DOMAINS</text>
  <g stroke="#0F112A" stroke-width="1.4" fill="none" opacity="0.8">
    <!-- aircraft -->
    <g transform="translate(108,176)"><ellipse cx="0" cy="0" rx="14" ry="3.2" fill="#0F112A"/><path d="M-2,-2 L-9,-12 L-13,-11 L-7,-1 Z" fill="#0F112A" stroke="none"/><path d="M-2,2 L-9,12 L-13,11 L-7,1 Z" fill="#0F112A" stroke="none"/></g>
    <!-- building/tower -->
    <g transform="translate(105,232)"><rect x="-9" y="-13" width="18" height="26" rx="1" fill="#0F112A" stroke="none"/><line x1="-3" y1="-13" x2="-3" y2="13" stroke="#1CCFC0" stroke-width="0.8"/><line x1="3" y1="-13" x2="3" y2="13" stroke="#1CCFC0" stroke-width="0.8"/></g>
    <!-- wind turbine -->
    <g transform="translate(106,290)"><line x1="0" y1="2" x2="0" y2="14" stroke-width="1.6"/><line x1="0" y1="0" x2="0" y2="-13"/><line x1="0" y1="0" x2="11" y2="6"/><line x1="0" y1="0" x2="-11" y2="6"/><circle cx="0" cy="0" r="1.8" fill="#0F112A" stroke="none"/></g>
    <!-- vehicle -->
    <g transform="translate(105,346)"><path d="M-13,4 L-13,-1 L-7,-1 L-3,-7 L7,-7 L11,-1 L13,-1 L13,4 Z" fill="#0F112A" stroke="none"/><circle cx="-7" cy="5" r="3" fill="#E7F6F5" stroke="#0F112A" stroke-width="1.4"/><circle cx="7" cy="5" r="3" fill="#E7F6F5" stroke="#0F112A" stroke-width="1.4"/></g>
  </g>
  <g stroke="#2B3062" stroke-width="1.2" fill="none" opacity="0.5">
    <path d="M125,176 L188,300"/><path d="M122,232 L188,310"/><path d="M122,290 L188,320"/><path d="M122,346 L188,330"/>
  </g>

  <!-- ===== GATE PANELS ===== -->
  <g font-family="ui-monospace, monospace">
    <!-- panel frames -->
    <g fill="#FFFFFF" fill-opacity="0.35" stroke="#2B3062" stroke-opacity="0.45" stroke-width="1.2">
      <rect x="195" y="150" width="125" height="235" rx="6"/>
      <rect x="360" y="150" width="125" height="235" rx="6"/>
      <rect x="525" y="150" width="135" height="235" rx="6" stroke="#0E988C" stroke-opacity="0.6" stroke-width="2"/>
      <rect x="700" y="150" width="125" height="235" rx="6"/>
    </g>
    <!-- headers -->
    <text x="257" y="172" font-size="11" font-weight="700" fill="#0F112A" letter-spacing="1" text-anchor="middle">MULTIPHYSICS</text>
    <text x="257" y="186" font-size="8.5" fill="#0E988C" letter-spacing="1" text-anchor="middle">EMIT</text>
    <text x="422" y="172" font-size="11" font-weight="700" fill="#0F112A" letter-spacing="1" text-anchor="middle">SciML</text>
    <text x="422" y="186" font-size="8.5" fill="#0E988C" letter-spacing="1" text-anchor="middle">ACCELERATE</text>
    <text x="592" y="172" font-size="12" font-weight="700" fill="#0E988C" letter-spacing="1" text-anchor="middle">UQ · CORE</text>
    <text x="592" y="186" font-size="8.5" fill="#0E988C" letter-spacing="1" text-anchor="middle">QUANTIFY UNCERTAINTY</text>
    <text x="762" y="172" font-size="11" font-weight="700" fill="#0F112A" letter-spacing="1" text-anchor="middle">LANGUAGE</text>
    <text x="762" y="186" font-size="8.5" fill="#0E988C" letter-spacing="1" text-anchor="middle">GUARANTEE · STAMP</text>
    <!-- team tags -->
    <g font-size="14" font-weight="700" fill="#2B3062" opacity="0.95" text-anchor="middle">
      <text x="257" y="378">PS · VN · AK</text>
      <text x="422" y="378">ZD · RM · AY</text>
      <text x="592" y="378">PH · AY</text>
      <text x="762" y="378">PH</text>
    </g>
  </g>

  <!-- ===== THE RIBBON (one conserved signal climbing the reliability axis) ===== -->
  <!-- G1: geometry -> mesh, the signal is emitted (born narrow) -->
  <g>
    <rect x="212" y="250" width="20" height="20" fill="#0F112A"/>
    <g stroke="#1CCFC0" stroke-width="0.8" opacity="0.7"><line x1="218" y1="250" x2="218" y2="270"/><line x1="225" y1="250" x2="225" y2="270"/><line x1="212" y1="257" x2="232" y2="257"/><line x1="212" y1="263" x2="232" y2="263"/></g>
    <path d="M240,255 L300,250 L290,243 M300,250 L290,257" fill="none" stroke="#0E988C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="257" y="300" font-family="ui-monospace, monospace" font-size="8" fill="#2B3062" text-anchor="middle" opacity="0.8">geometry→mesh</text>
  </g>
  <!-- thin ribbon G1->G2 -->
  <line x1="320" y1="248" x2="360" y2="246" stroke="#0E988C" stroke-width="2.4"/>

  <!-- G2: sparse points resolve into a dense surrogate line (acceleration) -->
  <g>
    <g fill="#ED481C" opacity="0.85"><circle cx="372" cy="252" r="2.2"/><circle cx="384" cy="238" r="2.2"/><circle cx="396" cy="250" r="2.2"/><circle cx="408" cy="241" r="2.2"/><circle cx="420" cy="246" r="2.2"/></g>
    <path d="M368,250 C384,238 400,250 422,243" fill="none" stroke="#0E988C" stroke-width="2.6"/>
    <g stroke="#2B3062" stroke-width="1" opacity="0.6"><circle cx="438" cy="244" r="3"/><circle cx="452" cy="240" r="3"/><circle cx="466" cy="246" r="3"/><line x1="438" y1="244" x2="452" y2="240"/><line x1="452" y1="240" x2="466" y2="246"/></g>
    <text x="422" y="300" font-family="ui-monospace, monospace" font-size="8" fill="#2B3062" text-anchor="middle" opacity="0.8">sparse→dense · Δt↓</text>
  </g>
  <!-- dense ribbon G2->G3 -->
  <line x1="485" y1="240" x2="525" y2="236" stroke="#0E988C" stroke-width="2.8"/>

  <!-- G3: the line opens into a +/- uncertainty envelope (widest = the core) -->
  <g clip-path="url(#g3clip)">
    <path id="env" d="M525,236 C560,232 590,230 660,226 L660,272 C590,276 560,278 525,282 Z" fill="#0E988C" opacity="0.18">
      <animate attributeName="opacity" values="0.18;0.26;0.18" dur="3.4s" repeatCount="indefinite"/>
    </path>
    <path d="M525,236 C560,232 590,230 660,226" fill="none" stroke="#1CCFC0" stroke-width="1.2" opacity="0.8"/>
    <path d="M525,282 C590,276 560,278 660,272" fill="none" stroke="#1CCFC0" stroke-width="1.2" opacity="0.8"/>
    <path d="M525,259 C560,255 590,253 660,249" fill="none" stroke="#0E988C" stroke-width="2.4"/>
    <g stroke="#0E988C" stroke-width="1" opacity="0.6"><line x1="560" y1="238" x2="560" y2="272"/><line x1="600" y1="234" x2="600" y2="268"/><line x1="635" y1="232" x2="635" y2="264"/></g>
  </g>
  <text x="592" y="300" font-family="ui-monospace, monospace" font-size="8" fill="#2B3062" text-anchor="middle" opacity="0.8">line → ±σ band</text>

  <!-- envelope G3->G4 -->
  <path d="M660,249 C675,247 686,246 700,245" fill="none" stroke="#0E988C" stroke-width="2.4"/>
  <path d="M660,226 L700,224 M660,272 L700,266" fill="none" stroke="#1CCFC0" stroke-width="1" opacity="0.7"/>

  <!-- G4: envelope hard-clipped to a guaranteed interval, {} + check seal (conformal) -->
  <g>
    <path d="M712,222 L706,222 L706,268 L712,268" fill="none" stroke="#ED481C" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M770,230 L776,230 L776,260 L770,260" fill="none" stroke="#ED481C" stroke-width="2.2" stroke-linecap="round"/>
    <rect x="712" y="232" width="58" height="26" fill="#ED481C" opacity="0.10"/>
    <path d="M712,245 C730,243 752,245 770,244" fill="none" stroke="#0E988C" stroke-width="2.4"/>
    <text x="741" y="228" font-family="ui-monospace, monospace" font-size="9" fill="#ED481C" text-anchor="middle" font-weight="700">{ }</text>
    <circle cx="792" cy="244" r="10" fill="none" stroke="#0E988C" stroke-width="2"/>
    <polyline points="787,244 791,248 798,239" fill="none" stroke="#0E988C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="762" y="300" font-family="ui-monospace, monospace" font-size="8" fill="#2B3062" text-anchor="middle" opacity="0.8">conformal clip · seal</text>
  </g>

  <!-- certified ribbon -> output -->
  <line x1="804" y1="244" x2="845" y2="244" stroke="#0E988C" stroke-width="2.8"/>

  <!-- CERTIFIED card -->
  <g>
    <rect x="846" y="196" width="120" height="96" rx="8" fill="#FFFFFF" fill-opacity="0.6" stroke="#0F112A" stroke-width="1.4"/>
    <circle cx="868" cy="220" r="9" fill="#FD9600"/>
    <polyline points="863,220 867,224 873,215" fill="none" stroke="#0F112A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="stroke-dashoffset" values="20;0" dur="0.01s" begin="0s" fill="freeze"/>
    </polyline>
    <text x="884" y="224" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#0F112A" letter-spacing="1">CERTIFIED</text>
    <path d="M858,260 C880,252 900,266 922,256" fill="none" stroke="#0E988C" stroke-width="2"/>
    <path d="M858,252 C880,244 900,258 922,248 L922,264 C900,274 880,260 858,268 Z" fill="#0E988C" opacity="0.14"/>
    <g fill="#0F112A"><circle cx="872" cy="259" r="1.8"/><circle cx="897" cy="261" r="1.8"/><circle cx="915" cy="254" r="1.8"/></g>
    <text x="906" y="284" font-family="ui-monospace, monospace" font-size="7.5" fill="#2B3062" text-anchor="middle" opacity="0.85">PREDICTION ± UNCERTAINTY</text>
  </g>

  <!-- Travelling data packets along the ribbon (the live signal) -->
  <g fill="#ED481C">
    <circle r="3.2"><animateMotion path="M200,250 L320,248 L360,246 L485,240 L525,236 L592,247 L700,245 L804,244 L845,244" dur="4.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;1;0" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle r="3.2"><animateMotion path="M200,250 L320,248 L360,246 L485,240 L525,236 L592,247 L700,245 L804,244 L845,244" dur="4.6s" begin="-2.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;1;0" dur="4.6s" begin="-2.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== BOTTOM: measurement ruler (the assessment datum) ===== -->
  <line x1="180" y1="430" x2="820" y2="430" stroke="#2B3062" stroke-width="1" opacity="0.4"/>
  <g stroke="#2B3062" stroke-width="0.8" opacity="0.3">
    <line x1="220" y1="426" x2="220" y2="434"/><line x1="300" y1="426" x2="300" y2="434"/><line x1="380" y1="426" x2="380" y2="434"/><line x1="460" y1="426" x2="460" y2="434"/><line x1="540" y1="426" x2="540" y2="434"/><line x1="620" y1="426" x2="620" y2="434"/><line x1="700" y1="426" x2="700" y2="434"/><line x1="780" y1="426" x2="780" y2="434"/>
  </g>
  <!-- error-bar drop lines from each gate registering to the datum -->
  <g stroke="#0E988C" stroke-width="0.9" opacity="0.4" stroke-dasharray="2 3">
    <line x1="257" y1="285" x2="257" y2="430"/><line x1="422" y1="285" x2="422" y2="430"/><line x1="592" y1="290" x2="592" y2="430"/><line x1="762" y1="285" x2="762" y2="430"/>
  </g>
  <text x="180" y="452" font-family="ui-monospace, monospace" font-size="9.5" fill="#2B3062" letter-spacing="1.5" opacity="0.85">ASSESS · MEASURE AGAINST DATUM</text>
  <text x="820" y="452" font-family="ui-monospace, monospace" font-size="9.5" fill="#2B3062" letter-spacing="1" opacity="0.7" text-anchor="end">INITIALS UNDER EACH STAGE = RESEARCHERS (SEE TEAM)</text>

  </g>
  <!-- /Figure body -->

  <!-- Corner brackets -->
  <g stroke="#2B3062" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round">
    <polyline points="20,20 20,40 40,40"/>
    <polyline points="980,20 980,40 960,40"/>
    <polyline points="20,580 20,560 40,560"/>
    <polyline points="980,580 980,560 960,560"/>
  </g>
</svg>
