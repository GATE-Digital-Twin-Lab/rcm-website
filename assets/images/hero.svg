<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640" height="480">
  <title>RCM Hero — Computational Modelling Abstract Visual</title>
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F4F9"/>
      <stop offset="100%" stop-color="#E7F6F5"/>
    </linearGradient>
    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#2B3062" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="640" height="480" fill="url(#bg-grad)"/>
  <!-- Dot grid -->
  <rect width="640" height="480" fill="url(#dots)"/>

  <!-- Contour / mesh lines (teal) — concentric wave shapes -->
  <g stroke="#0E988C" stroke-width="1.2" fill="none" opacity="0.55">
    <ellipse cx="380" cy="260" rx="80" ry="55"/>
    <ellipse cx="380" cy="260" rx="120" ry="85"/>
    <ellipse cx="380" cy="260" rx="160" ry="115"/>
    <ellipse cx="380" cy="260" rx="200" ry="145"/>
    <ellipse cx="380" cy="260" rx="240" ry="175"/>
  </g>

  <!-- Flow lines (orange) — horizontal wave paths -->
  <g stroke="#ED481C" stroke-width="1.4" fill="none" opacity="0.45">
    <path d="M60,160 Q160,130 260,160 T460,160 T640,160"/>
    <path d="M60,195 Q160,165 260,195 T460,195 T640,195"/>
    <path d="M60,230 Q160,200 260,230 T460,230 T640,230"/>
  </g>

  <!-- Mesh triangulation (navy, light) -->
  <g stroke="#0F112A" stroke-width="0.7" fill="none" opacity="0.12">
    <line x1="60" y1="80" x2="200" y2="340"/>
    <line x1="200" y1="340" x2="460" y2="120"/>
    <line x1="460" y1="120" x2="60" y2="80"/>
    <line x1="460" y1="120" x2="580" y2="380"/>
    <line x1="200" y1="340" x2="580" y2="380"/>
    <line x1="60" y1="80" x2="580" y2="380"/>
    <line x1="130" y1="210" x2="380" y2="420"/>
    <line x1="380" y1="420" x2="560" y2="180"/>
    <line x1="130" y1="210" x2="560" y2="180"/>
    <line x1="270" y1="60" x2="130" y2="210"/>
    <line x1="270" y1="60" x2="560" y2="180"/>
  </g>

  <!-- Teal bright accent nodes at mesh vertices -->
  <g fill="#1CCFC0">
    <circle cx="60" cy="80" r="4"/>
    <circle cx="200" cy="340" r="3"/>
    <circle cx="460" cy="120" r="5"/>
    <circle cx="580" cy="380" r="3"/>
    <circle cx="270" cy="60" r="3.5"/>
    <circle cx="130" cy="210" r="3"/>
    <circle cx="380" cy="420" r="3"/>
    <circle cx="560" cy="180" r="4"/>
  </g>

  <!-- Orange-red accent node (focal point) -->
  <circle cx="380" cy="260" r="7" fill="#ED481C"/>
  <circle cx="380" cy="260" r="13" fill="none" stroke="#ED481C" stroke-width="1.5" opacity="0.4"/>

  <!-- Gold accent small marks -->
  <g fill="#FD9600" opacity="0.75">
    <rect x="140" y="360" width="6" height="6" rx="1" transform="rotate(45 143 363)"/>
    <rect x="500" y="90" width="5" height="5" rx="1" transform="rotate(45 502 92)"/>
  </g>

  <!-- Corner bracket decorations -->
  <g stroke="#2B3062" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round">
    <polyline points="16,16 16,36 36,36"/>
    <polyline points="624,16 624,36 604,36"/>
    <polyline points="16,464 16,444 36,444"/>
    <polyline points="624,464 624,444 604,444"/>
  </g>

  <!-- Subtle label -->
  <text x="32" y="460" font-family="ui-monospace, monospace" font-size="9" fill="#2B3062" opacity="0.4" letter-spacing="2">GATE RCM · RELIABLE COMPUTATIONAL MODELLING</text>
</svg>
