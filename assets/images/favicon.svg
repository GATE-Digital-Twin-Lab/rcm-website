<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>RCM Favicon</title>
  <!-- Navy background square -->
  <rect width="32" height="32" rx="4" fill="#0F112A"/>
  <!-- Teal geometric bracket -->
  <polyline points="6,6 6,22 10,22" stroke="#1CCFC0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Orange accent dot -->
  <circle cx="20" cy="14" r="3.5" fill="#ED481C"/>
  <!-- R monogram -->
  <text x="13" y="22" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">R</text>
</svg>
